# Alembic configuration for Callendulla.
#
# The actual DSN comes from Settings.db_dsn_sync at runtime (migrations/env.py).
# The sqlalchemy.url here is a placeholder that Alembic requires syntactically
# — env.py overrides it before any connection happens.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
sqlalchemy.url = postgresql+psycopg2://placeholder/placeholder

# Use a single recursive transaction per migration so that on failure the
# whole script rolls back. Without it, DDL inside a script that fails halfway
# leaves the DB in a half-migrated state.
transaction_per_migration = false

# Stop generating *empty* revisions when no schema diff was detected —
# protects against noise commits when running autogenerate by mistake.
revision_environment = false

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
