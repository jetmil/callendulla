# Callendulla gitleaks config.
# Extends gitleaks built-in rules + adds project-specific allowlist.
# Validate locally: `gitleaks detect --source . --config .gitleaks.toml --verbose`

title = "Callendulla gitleaks rules"

[extend]
# Pull in everything from the default ruleset (~150 detectors:
# AWS, GCP, GitHub PAT, OpenAI, Anthropic, Telegram, Stripe, etc.)
useDefault = true

# ─── Project-specific rules on top of the defaults ──────────────────
[[rules]]
id = "telegram-bot-token-strict"
description = "Telegram Bot API token (digits:base64-like)"
regex = '''\b\d{9,12}:[A-Za-z0-9_-]{30,40}\b'''
tags = ["telegram", "secret"]

[[rules]]
id = "gemini-api-key"
description = "Google Gemini / Generative AI API key (AIzaSy*)"
regex = '''\bAIzaSy[A-Za-z0-9_-]{33}\b'''
tags = ["google", "gemini", "secret"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-*)"
regex = '''\bsk-ant-[A-Za-z0-9_-]{20,}\b'''
tags = ["anthropic", "secret"]

[[rules]]
id = "fernet-key"
description = "Fernet symmetric key (base64, 44 chars ending with =)"
# Conservative: 43 base64-url chars + literal '='. Matches DIARY_ENCRYPTION_KEY shape.
regex = '''(?i)(diary_encryption_key|fernet[_-]?key)\s*[:=]\s*["']?[A-Za-z0-9_-]{43}=["']?'''
tags = ["crypto", "secret"]

# ─── Allowlist: example placeholders that look like secrets but aren't ─
[allowlist]
description = "Documentation placeholders and known-safe paths"
paths = [
    '''\.gitleaks\.toml$''',  # the regexes themselves
    '''\.env\.example$''',     # placeholder env file
    '''LICENSE$''',
    '''^docs/.*\.md$''',
    '''CHANGELOG\.md$''',
]
regexes = [
    # Placeholder strings used in docs/examples:
    '''YOUR[_-]?TOKEN[_-]?HERE''',
    '''SECRET[_-]?PATH[_-]?HERE''',
    '''CHANGE[_-]?ME''',
    '''<your[_-]?[a-z]+>''',
    '''example\.com''',
    # Telegram bot token format used in /BotFather screenshots / docs:
    '''123456789:ABCdefGHIjklMNOpqrsTUVwxyz0123456789''',
    # SHA placeholders in Dockerfile docs:
    '''sha256:abc123\.\.\.''',
]
