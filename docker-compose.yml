# Callendulla — self-host stack
# docker compose up -d
#
# Override anything you need in docker-compose.override.yml (gitignored).
# Production hardening notes — see SECURITY.md.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: callendulla
      POSTGRES_USER: callendulla
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOTE: port not exposed to host by default — only the `app` service
    # reaches Postgres via internal network. If you need psql from host,
    # add to docker-compose.override.yml:
    #   ports: ["127.0.0.1:5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callendulla -d callendulla"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --save ""
      - --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    image: ghcr.io/jetmil/callendulla:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # override .env defaults to point at compose services
      DB_DSN: postgresql+asyncpg://callendulla:${POSTGRES_PASSWORD}@postgres:5432/callendulla
      DB_DSN_SYNC: postgresql+psycopg2://callendulla:${POSTGRES_PASSWORD}@postgres:5432/callendulla
      REDIS_URL: redis://redis:6379/0
    ports:
      # web console + API; put nginx/Caddy in front for TLS in production
      - "127.0.0.1:8290:8290"
    volumes:
      # voice diary blobs and pre-rendered voice banks
      - app_data:/app/data
      - app_logs:/app/logs
      # optional: bring your own Piper voices
      # - ./voices:/app/voices:ro

  # Optional Ollama for local LLM. Uncomment and set LLM_PROVIDER=ollama,
  # LLM_MODEL=gemma3:12b (or whatever you pulled), OLLAMA_BASE_URL=http://ollama:11434
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  app_data:
  app_logs:
  # ollama_data:
