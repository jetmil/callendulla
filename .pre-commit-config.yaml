# See https://pre-commit.com for usage and config.
# Install: `pip install pre-commit && pre-commit install`
# Run on all files manually: `pre-commit run --all-files`

minimum_pre_commit_version: "3.5.0"
default_language_version:
  python: python3.12

ci:
  autofix_commit_msg: "style: pre-commit auto-fixes"
  autoupdate_schedule: monthly
  autoupdate_commit_msg: "chore(deps): pre-commit autoupdate"
  # gitleaks needs a real go runtime — skip on pre-commit.ci, GH Actions covers it.
  skip: [gitleaks]

repos:
  # ─── secret scanning ───────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ─── basic hygiene ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'  # markdown trailing-space = hard linebreak, keep
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # docker-compose anchors etc.
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main]

  # ─── python lint / format ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ─── shellscripts ──────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # ─── dockerfile ────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--ignore=DL3008, --ignore=DL3013]  # pin OS deps / pip versions

  # ─── conventional commits ──────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
