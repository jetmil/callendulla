# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual run from the Actions tab to re-validate.
  workflow_dispatch:

# Cancel in-progress runs on new push to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — read-only by default. Individual jobs upgrade if needed.
permissions:
  contents: read

jobs:
  # ─── secret scanning ─────────────────────────────────────────────
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─── python lint + types ─────────────────────────────────────────
  lint:
    name: ruff + mypy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: mypy
        # mypy only runs over src/ when it exists. Skip gracefully on
        # skeleton-only commits — the dedicated tests job is the real gate.
        run: |
          if [ -d src ]; then
            mypy src/
          else
            echo "src/ not present yet — skipping mypy"
          fi

  # ─── tests ───────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-24.04
    # Need Postgres+Redis via testcontainers — Docker is available on the runner.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Run pytest
        run: |
          if [ -d tests ] && [ -n "$(find tests -name 'test_*.py' -print -quit)" ]; then
            pytest --cov=callendulla --cov-report=term-missing
          else
            echo "no tests yet — skeleton stage"
          fi

  # ─── docker build sanity ─────────────────────────────────────────
  docker-build:
    name: docker build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: callendulla:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── shellcheck for deploy/ scripts ──────────────────────────────
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./deploy
          severity: warning

  # ─── hadolint for Dockerfile ─────────────────────────────────────
  hadolint:
    name: hadolint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013
