# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual run from the Actions tab to re-validate.
  workflow_dispatch:

# Cancel in-progress runs on new push to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — read-only by default. Individual jobs upgrade if needed.
permissions:
  contents: read

jobs:
  # ─── secret scanning ─────────────────────────────────────────────
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─── python lint + types ─────────────────────────────────────────
  lint:
    name: ruff + mypy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: mypy
        # mypy only runs over src/ when it exists. Skip gracefully on
        # skeleton-only commits — the dedicated tests job is the real gate.
        run: |
          if [ -d src ]; then
            mypy src/
          else
            echo "src/ not present yet — skipping mypy"
          fi

  # ─── unit tests (SQLite, fast) ───────────────────────────────────
  test-unit:
    name: pytest unit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Run unit tests
        # ``--ignore=tests/integration`` keeps the docker-dependent
        # tests off the unit job; they have their own runner below.
        # Coverage report stays as artifact for the badge.
        run: |
          pytest --ignore=tests/integration \
                 --cov=callendulla --cov-report=term-missing \
                 --cov-report=xml:coverage.xml
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # ─── integration tests (real Postgres + Redis via testcontainers) ─
  test-integration:
    name: pytest integration
    runs-on: ubuntu-24.04
    # Docker daemon is present on ubuntu-24.04 runners — testcontainers
    # uses it directly. We pre-pull the images to keep the per-test
    # wait predictable.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Pre-pull container images
        # Saves ~5s per test session; cheap and removes a flaky vector
        # (first test paying for image pull vs. its own startup wait).
        run: |
          docker pull postgres:16-alpine
          docker pull redis:7-alpine
      - name: Run integration tests
        run: pytest tests/integration -v

  # ─── docker build sanity ─────────────────────────────────────────
  docker-build:
    name: docker build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: callendulla:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── shellcheck for deploy/ scripts ──────────────────────────────
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./deploy
          severity: warning

  # ─── hadolint for Dockerfile ─────────────────────────────────────
  hadolint:
    name: hadolint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013

  # ─── docker compose smoke ────────────────────────────────────────
  # Boots the full compose stack with a throwaway .env, waits for the
  # app container to become healthy, hits /health and /source to
  # prove the wiring (api + postgres + redis + alembic migration on
  # entrypoint) actually works together. Catches regressions like
  # "the image builds but Alembic can't reach postgres" that no unit
  # test sees.
  compose-smoke:
    name: docker compose smoke
    runs-on: ubuntu-24.04
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - name: Generate a throwaway .env
        run: |
          cat > .env <<EOF
          TELEGRAM_BOT_TOKEN=1234567890:CI-SMOKE-FAKE-TOKEN-DO-NOT-USE-AT-ALL
          OWNER_TG_ID=1
          BOT_MODE=polling
          LLM_PROVIDER=ollama
          LLM_MODEL=stub
          SECRET_KEY=$(openssl rand -hex 32)
          DIARY_ENCRYPTION_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          POSTGRES_PASSWORD=$(openssl rand -hex 16)
          DB_DSN=postgresql+asyncpg://callendulla:\${POSTGRES_PASSWORD}@postgres:5432/callendulla
          DB_DSN_SYNC=postgresql+psycopg2://callendulla:\${POSTGRES_PASSWORD}@postgres:5432/callendulla
          REDIS_URL=redis://redis:6379/0
          AGPL_SOURCE_URL=https://github.com/jetmil/callendulla
          ALLOWED_HOSTS=*
          ICAL_RATE_LIMIT_PER_IP_HOURLY=0
          EOF
          # Expand POSTGRES_PASSWORD inside the DSN values
          # (the heredoc above writes the literal ${POSTGRES_PASSWORD}).
          PG_PWD=$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)
          sed -i "s|\\\${POSTGRES_PASSWORD}|${PG_PWD}|g" .env

      - name: docker compose up -d
        run: docker compose up -d --build

      - name: Wait for app healthy
        # Containers boot order: postgres → app (entrypoint runs
        # alembic upgrade head, then supervisord). HEALTHCHECK in
        # Dockerfile has start-period=60s; we poll up to 120s.
        run: |
          for i in $(seq 1 24); do
            STATUS=$(docker inspect --format '{{.State.Health.Status}}' \
              "$(docker compose ps -q app)" 2>/dev/null || echo "starting")
            echo "attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "app never became healthy"
          docker compose logs app
          exit 1

      - name: Hit /health
        run: |
          STATUS=$(curl -s -o /tmp/health.json -w '%{http_code}' \
            http://127.0.0.1:8290/health)
          test "$STATUS" = "200" || { cat /tmp/health.json; exit 1; }
          cat /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json

      - name: Hit /source (AGPL §13 disclosure)
        run: |
          STATUS=$(curl -s -o /tmp/source.json -w '%{http_code}' \
            http://127.0.0.1:8290/source)
          test "$STATUS" = "200" || { cat /tmp/source.json; exit 1; }
          cat /tmp/source.json
          # license must say AGPL
          grep -q '"license":"AGPL-3.0-or-later"' /tmp/source.json
          # X-Source-URL header must echo the configured AGPL_SOURCE_URL
          HEADER=$(curl -s -D - http://127.0.0.1:8290/health -o /dev/null \
            | grep -i '^x-source-url:' || true)
          test -n "$HEADER" || { echo "no X-Source-URL header"; exit 1; }

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: docker compose down
        if: always()
        run: docker compose down -v
